# =============================================================================
# 机密扫描门禁(v2.3 可选)
# -----------------------------------------------------------------------------
# 用 gitleaks 扫:
#   - PR diff(把刚提交进来的 token/key 揪出来)
#   - 历史(weekly schedule 时全仓扫一次,补救老 commit 里的泄漏)
#
# 任意命中 → BLOCK。结果会尽量以 SARIF 上传到 GitHub Security 标签;
# 私有仓或未启用 code scanning 时,SARIF 上传失败不影响门禁判定。
#
# 启用:拷到 .github/workflows/,即用。无需 secret(用 GITHUB_TOKEN 内置)。
# 强烈建议把 secret-scan-gate 设为 main 的 required check。
#
# False positive 屏蔽:在 repo 根放 .gitleaks.toml,允许列 rules 与 allow 规则。
# =============================================================================
name: Secret Scan

on:
  workflow_dispatch: {} # Optional gate. Enable PR/push triggers when required.

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    outputs:
      leaks_found: ${{ steps.scan.outputs.leaks_found }}
      scan_failed: ${{ steps.scan.outputs.scan_failed }}
      scan_exit_code: ${{ steps.scan.outputs.exit_code }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }     # gitleaks 要看历史
      - name: Install gitleaks
        run: |
          curl -sL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
          gitleaks version
      - name: Determine scan range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "MODE=pr"   >> $GITHUB_OUTPUT
            echo "BASE=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "HEAD=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ]; then
            echo "MODE=full" >> $GITHUB_OUTPUT
          else
            echo "MODE=push" >> $GITHUB_OUTPUT
          fi
      - name: Gitleaks scan
        id: scan
        run: |
          set +e
          case "${{ steps.range.outputs.MODE }}" in
            pr)
              gitleaks detect --source . --no-banner --redact \
                --log-opts="${{ steps.range.outputs.BASE }}..${{ steps.range.outputs.HEAD }}" \
                --exit-code 2 \
                --report-format sarif --report-path gitleaks.sarif
              ;;
            full)
              gitleaks detect --source . --no-banner --redact \
                --exit-code 2 \
                --report-format sarif --report-path gitleaks.sarif
              ;;
            *)
              gitleaks detect --source . --no-banner --redact \
                --exit-code 2 \
                --report-format sarif --report-path gitleaks.sarif
              ;;
          esac
          scan_exit=$?
          set -e

          echo "exit_code=${scan_exit}" >> "$GITHUB_OUTPUT"
          if [ "$scan_exit" -eq 0 ]; then
            echo "leaks_found=false" >> "$GITHUB_OUTPUT"
            echo "scan_failed=false" >> "$GITHUB_OUTPUT"
            echo "No secrets detected by gitleaks."
          elif [ "$scan_exit" -eq 2 ]; then
            echo "leaks_found=true" >> "$GITHUB_OUTPUT"
            echo "scan_failed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Gitleaks detected possible secrets. The gate job will block this run."
          else
            echo "leaks_found=false" >> "$GITHUB_OUTPUT"
            echo "scan_failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::Gitleaks failed to complete. Exit code: ${scan_exit}"
          fi
      - name: Upload SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
      - name: Upload SARIF artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif-${{ github.run_id }}
          path: gitleaks.sarif
          if-no-files-found: ignore
      - name: Comment on PR if leaks found
        if: steps.scan.outputs.leaks_found == 'true' && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s\n' \
            '🛑 **Secret Scan BLOCK** — 检测到可能的机密/凭证泄漏。' \
            '' \
            '请立即:' \
            '1. **轮换**所有可能泄漏的 token / key(不要只 force-push)' \
            '2. 用 `git filter-repo` 或 BFG 清理历史' \
            '3. 在 `.gitleaks.toml` 添加 allow 规则(仅当确认是 false positive 时)' \
            '' \
            '详情见 Security 标签 → Code scanning alerts → Tool: gitleaks；若仓库未启用 code scanning,请下载本次 Actions 的 gitleaks-sarif artifact。' \
            > /tmp/leak-comment.md
          gh pr comment ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --body-file /tmp/leak-comment.md

  secret-scan-gate:
    needs: gitleaks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate
        run: |
          if [ '${{ needs.gitleaks.result }}' != 'success' ]; then
            echo "::error::secret-scan-gate 基础设施失败 — gitleaks job 未能完成,不是泄漏判定。"
            exit 1
          fi
          if [ '${{ needs.gitleaks.outputs.scan_failed }}' = 'true' ]; then
            echo "::error::secret-scan-gate 失败 — gitleaks 扫描器异常退出(exit=${{ needs.gitleaks.outputs.scan_exit_code }}),不是泄漏判定。"
            exit 1
          fi
          if [ '${{ needs.gitleaks.outputs.leaks_found }}' = 'true' ]; then
            echo "::error::secret-scan-gate 失败 — gitleaks 检测到可能的机密/凭证泄漏。"
            exit 1
          fi
          echo "✅ secret-scan-gate green."
